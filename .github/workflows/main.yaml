name: workflow

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint code
        run: echo "Linting repository"

      - name: Run unit tests
        run: echo "Running unit tests"

  build-and-push-ecr-image:
    name: Continuous Delivery
    needs: integration
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true  # ← was missing in your new yaml

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          # Verify the value before writing to output
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Built and pushed image: $IMAGE_URI"
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      # ↓ Add this debug step — helps catch empty outputs immediately
      - name: Verify image output
        run: |
          echo "Image output value: ${{ steps.build-image.outputs.image }}"
          if [ -z "${{ steps.build-image.outputs.image }}" ]; then
            echo "ERROR: image output is empty!"
            exit 1
          fi

  Continuous-Deployment:
    name: Continuous Deployment
    needs: build-and-push-ecr-image
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Pull latest image
        # ↓ FIX: Use secrets directly (same as old working yaml) as the reliable fallback.
        #   This avoids depending on cross-job output passing entirely.
        env:
          IMAGE: ${{ needs.build-and-push-ecr-image.outputs.image }}
        run: |
          # Use job output if available, otherwise fall back to secrets
          PULL_IMAGE="${IMAGE:-${{ secrets.AWS_ECR_LOGIN_URI }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest}"
          echo "Pulling: $PULL_IMAGE"
          docker pull $PULL_IMAGE

      - name: Stop and remove old container
        run: |
          # ↓ FIX: Safer pattern from old yaml — avoids failure if container doesn't exist
          docker ps -q --filter "name=texts" | grep -q . && docker stop texts && docker rm -fv texts || true

      - name: Run Docker container
        env:
          IMAGE: ${{ needs.build-and-push-ecr-image.outputs.image }}
        run: |
          RUN_IMAGE="${IMAGE:-${{ secrets.AWS_ECR_LOGIN_URI }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest}"
          docker run -d \
            -p 8080:8080 \
            --name texts \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_REGION="${{ secrets.AWS_REGION }}" \
            $RUN_IMAGE

      - name: Clean unused Docker resources
        run: docker system prune -f